<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio de Cultos — Sequência Contínua</title>
<style>
  :root{ --border:#7a7a7a; --blue:#dbe7ff; --orange:#f4e0c8; --red:#f8d6d6; --titlebar:#cfcfcf; }
  body{ font-family: Arial, sans-serif; margin:0; background:#f7f7f7; color:#111; }
  .wrap{max-width:1100px;margin:18px auto;padding:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  h1{font-size:24px;text-align:center}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
  button{padding:8px;cursor:pointer}
  #painelEditores {display:none;margin-bottom:12px}
  .panel{display:flex;gap:16px;flex-wrap:wrap;}
  .card{flex:1 1 360px;padding:12px;border:1px solid var(--border)}
  textarea.oper{width:100%;height:80px;box-sizing:border-box;}
  .title-bar{text-align:center;padding:8px;background:var(--titlebar);font-weight:700;margin-top:10px}
  table.sheet{width:100%;border-collapse:collapse;font-size:14px}
  table.sheet th, table.sheet td{border:1px solid var(--border);padding:8px}
  .destaque{background-color:#ffeb3b; font-weight:bold;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="wrap">
  <h1>RODÍZIO MÊS DE <span id="previewMes">—</span></h1>
  <div class="controls">
    <input id="monthPick" type="month" />
    <button id="btnGenerate">Gerar Rodízio</button>
    <button onclick="window.print()">Imprimir</button>
    <button onclick="toggleEdit()">⚙️ Configurar</button>
  </div>
  <div id="painelEditores">
    <div class="card">
        <label>Lista Cultos (Coloque na ordem desejada):</label>
        <textarea id="opsCulto" class="oper">CESA
ROMULO
DANIEL
FABIO</textarea>
        <button onclick="salvarConfig()">Salvar e Definir como Início</button>
    </div>
  </div>
  <div id="resultArea"></div>
</div>

<script>
const monthShort = ['JAN.','FEV.','MAR.','ABR.','MAI.','JUN.','JUL.','AGO.','SET.','OUT.','NOV.','DEZ.'];

function toggleEdit() {
  const p = document.getElementById('painelEditores');
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function salvarConfig() {
  const lista = document.getElementById('opsCulto').value.split('\n').filter(s=>s.trim());
  const config = { lista: lista, base: new Date().getTime() };
  localStorage.setItem('rodizio_config', JSON.stringify(config));
  alert("Lista salva! O rodízio continuará a partir de hoje.");
  gerarRodizio();
}

function gerarRodizio() {
  const [y, m] = document.getElementById('monthPick').value.split('-').map(Number);
  const mi = m - 1;
  const config = JSON.parse(localStorage.getItem('rodizio_config')) || {lista: ["CESA","ROMULO","DANIEL","FABIO"], base: new Date().getTime()};
  document.getElementById('opsCulto').value = config.lista.join('\n');
  
  // Calcula quantos cultos (Dom, Ter, Qui) ocorreram desde a data base
  let totalCultos = 0;
  let d = new Date(config.base);
  while(d < new Date(y, mi, 1)) {
    if([0, 2, 4].includes(d.getDay())) totalCultos++;
    d.setDate(d.getDate() + 1);
  }

  let html = `<div class="title-bar">CULTOS</div><table class="sheet"><tr><th>DATA</th><th>IRMÃO</th></tr>`;
  let doms = [];
  
  for(let i=1; i<=31; i++){
    let dt = new Date(y, mi, i);
    if(dt.getMonth() !== mi) break;
    if(dt.getDay() === 0) doms.push(dt);
    
    if([0, 2, 4].includes(dt.getDay())){
      let nome = config.lista[totalCultos % config.lista.length];
      let cl = "";
      if(mi % 2 === 0 && dt.getDay() === 0 && doms.length === 2) { nome += " — BATISMO"; cl = "class='destaque'"; }
      html += `<tr ${cl}><td>${dt.getDate()}-${monthShort[mi]}</td><td>${nome}</td></tr>`;
      totalCultos++;
    }
  }
  document.getElementById('resultArea').innerHTML = html + "</table>";
  document.getElementById('previewMes').textContent = monthShort[mi] + ' - ' + y;
}

document.getElementById('btnGenerate').addEventListener('click', gerarRodizio);
document.getElementById('monthPick').value = new Date().toISOString().slice(0,7);
gerarRodizio();
</script>
</body>
</html>
