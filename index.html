<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio de Cultos</title>
<style>
  body{font-family:Arial,sans-serif;margin:10px;background:#f4f4f4}
  table{width:100%;border-collapse:collapse;margin-bottom:20px;background:#fff}
  th,td{border:1px solid #ccc;padding:8px;text-align:left}
  .title-bar{background:#ddd;font-weight:bold;padding:5px;text-align:center;border:1px solid #ccc}
  .destaque{background-color:#ffeb3b;font-weight:bold;color:#d32f2f}
</style>
</head>
<body>

<h1>RODÍZIO MÊS DE <span id="mesDisp"></span></h1>
<input type="month" id="mesPick">
<button onclick="render()">Gerar Rodízio</button>
<button onclick="document.getElementById('editPanel').style.display='block'">Editar Nomes</button>

<div id="editPanel" style="display:none; background:#eee; padding:10px; margin:10px 0;">
  <textarea id="listaNomes" style="width:100%;height:100px;">ROMULO
DANIEL
FABIO
CESA</textarea>
  <button onclick="salvar()">Salvar e Gerar</button>
</div>

<div id="app"></div>

<script>
function salvar(){
  localStorage.setItem('nomes', document.getElementById('listaNomes').value);
  document.getElementById('editPanel').style.display='none';
  render();
}

function render(){
  const nomes = (localStorage.getItem('nomes') || document.getElementById('listaNomes').value).split('\n').filter(n=>n.trim());
  const [y, m] = document.getElementById('mesPick').value.split('-').map(Number);
  document.getElementById('mesDisp').innerText = m+"/"+y;
  
  let p = (((y-2026)*12) + (m-1)) % nomes.length;
  let html = `<div class="title-bar">CULTOS</div><table><tr><th>DATA</th><th>IRMÃO</th></tr>`;
  
  let d = new Date(y, m-1, 1);
  while(d.getMonth() === m-1){
    if([0,2,4].includes(d.getDay())){
      let nome = nomes[p++ % nomes.length];
      let cl = "";
      if(d.getDay()==0 && d.getDate()>7 && d.getDate()<=14 && (m%2!=0)){ nome+=" — BATISMO"; cl="class='destaque'"; }
      html += `<tr ${cl}><td>${d.getDate()}/${m}</td><td>${nome}</td></tr>`;
    }
    d.setDate(d.getDate()+1);
  }
  
  html += `</table><div class="title-bar">REUNIÃO JOVENS</div><table>...</table><div class="title-bar">ENSAIO</div><table>...</table>`;
  document.getElementById('app').innerHTML = html;
}

document.getElementById('mesPick').value = new Date().toISOString().slice(0,7);
if(localStorage.getItem('nomes')) document.getElementById('listaNomes').value = localStorage.getItem('nomes');
render();
</script>
</body>
</html>
