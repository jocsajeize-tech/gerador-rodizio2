<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Rodízio Fixo</title>
<style>
  body{font-family:sans-serif; padding:20px;}
  textarea{width:100%; height:60px;}
  table{width:100%; border-collapse:collapse; margin-bottom:20px;}
  th, td{border:1px solid #000; padding:8px;}
</style>
</head>
<body>

<h3>Editores</h3>
<textarea id="listCulto">CESA&#10;ROMULO&#10;DANIEL&#10;FABIO</textarea>
<button onclick="render()">Gerar Rodízio</button>

<div id="saida"></div>

<script>
function render() {
  const lista = document.getElementById('listCulto').value.split('\n');
  
  let html = "<h3>CULTOS</h3><table>";
  // Apenas lista o que esta na caixa de texto, na ordem exata
  lista.forEach((nome, i) => {
    html += `<tr><td>${i+1}</td><td>${nome}</td></tr>`;
  });
  html += "</table>";
  
  document.getElementById('saida').innerHTML = html;
}
</script>
</body>
</html>
