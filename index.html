<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Rodízio</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        .wrap { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #eee; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; background: #2e6be6; color: white; border-radius: 4px; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Rodízio Mensal</h1>
    <div class="controls">
        <input type="month" id="monthPick">
        <button class="btn" onclick="gerar()">Gerar Rodízio</button>
    </div>
    <div id="painelEditores" style="display:none;">
        <label>Operadores (um por linha):</label>
        <textarea id="listaOps">CESA&#10;ROMULO&#10;DANIEL&#10;FABIO</textarea>
    </div>
    <button onclick="document.getElementById('painelEditores').style.display='block'">Editar Operadores</button>
    <div id="resultado"></div>
</div>

<script>
    function gerar() {
        const ops = document.getElementById('listaOps').value.split('\n').filter(s => s.trim() !== "");
        const mesAno = document.getElementById('monthPick').value.split('-');
        const y = parseInt(mesAno[0]), m = parseInt(mesAno[1]) - 1;
        
        let html = "<table><tr><th>Data</th><th>Irmão</th></tr>";
        let dia = 1, opsIdx = 0;
        
        while (new Date(y, m, dia).getMonth() === m) {
            let data = new Date(y, m, dia);
            // Pega domingos (0), terças (2) e quintas (4)
            if ([0, 2, 4].includes(data.getDay())) {
                let nome = ops[opsIdx % ops.length];
                // Regra Batismo: mês ímpar (0, 2, 4...) e 2º domingo
                if (m % 2 === 0 && data.getDay() === 0) {
                    let domingos = [];
                    for(let i=1; i<=31; i++) {
                        let d = new Date(y, m, i);
                        if(d.getMonth() === m && d.getDay() === 0) domingos.push(d.getDate());
                    }
                    if (data.getDate() === domingos[1]) nome += " (BATISMO)";
                }
                html += `<tr><td>${data.getDate()}/${m+1}</td><td>${nome}</td></tr>`;
                opsIdx++;
            }
            dia++;
        }
        document.getElementById('resultado').innerHTML = html + "</table>";
    }
</script>
</body>
</html>
