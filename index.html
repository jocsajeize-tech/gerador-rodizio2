<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio de Cultos Completo</title>
<style>
  :root{ --border:#7a7a7a; --titlebar:#cfcfcf; --blue:#dbe7ff; --orange:#f4e0c8; --red:#f8d6d6; }
  body{ font-family: Arial, sans-serif; margin:0; background:#f7f7f7; }
  .wrap{max-width:1100px;margin:18px auto;padding:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  h1{text-align:center}
  .controls{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
  .title-bar{text-align:center;padding:8px;border:1px solid var(--border);background:var(--titlebar);font-weight:700;margin-top:20px;margin-bottom:8px}
  table.sheet{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:14px}
  table.sheet th, table.sheet td{border:1px solid var(--border);padding:8px}
  .batismo-destaque { background-color: #fff380; font-weight: bold; }
</style>
</head>
<body>
<div class="wrap">
  <h1>RODÍZIO MÊS DE <span id="previewMes">—</span></h1>
  <div class="controls">
    <input id="monthPick" type="month" />
    <button onclick="gerarTudo()">Gerar Tudo</button>
  </div>
  <div id="resultArea"></div>
</div>

<script>
const monthShort = ['JAN.','FEV.','MAR.','ABR.','MAI.','JUN.','JUL.','AGO.','SET.','OUT.','NOV.','DEZ.'];

function gerarTudo() {
  const [y, m] = document.getElementById('monthPick').value.split('-').map(Number);
  const mi = m - 1;
  document.getElementById('previewMes').textContent = m + "/" + y;

  // Listas fixas (pode substituir pelos nomes reais)
  const listaCulto = ["CESA", "ROMULO", "DANIEL", "FABIO"];
  const listaJovem = ["DANIEL F.N", "JONATAS"];
  const listaEnsaio = ["JONATAS"];
  const listaCultoJovem = ["FABIO"];

  let html = `<div class="title-bar">CULTOS</div><table class="sheet"><tr><th>DATA</th><th>IRMÃO</th></tr>`;
  
  let domingos = [];
  for(let d=1; d<=31; d++){
    let dt = new Date(y, mi, d);
    if(dt.getMonth() === mi && dt.getDay() === 0) domingos.push(dt);
  }

  let pC = 0;
  for(let d=1; d<=31; d++){
    let dt = new Date(y, mi, d);
    if(dt.getMonth() !== mi) break;
    if([0, 2, 4].includes(dt.getDay())){
      let nome = listaCulto[pC++ % listaCulto.length];
      let cls = "";
      if(m % 2 !== 0 && dt.getDate() === domingos[1].getDate()){
        nome += " — BATISMO"; cls = "class='batismo-destaque'";
      }
      html += `<tr ${cls}><td>${dt.getDate()}-JUL.</td><td>${nome}</td></tr>`;
    }
  }
  html += `</table>`;

  // Tabela Reunião Jovens
  html += `<div class="title-bar" style="background:var(--blue)">REUNIÃO JOVENS</div><table class="sheet"><tr><th>DATA</th><th>IRMÃO</th></tr>`;
  domingos.forEach((d, i) => {
    html += `<tr><td>${d.getDate()}-JUL.</td><td>${listaJovem[i % listaJovem.length]}</td></tr>`;
  });
  html += `</table>`;

  // Tabela Ensaio
  html += `<div class="title-bar" style="background:var(--orange)">ENSAIO</div><table class="sheet"><tr><th>DATA</th><th>IRMÃO</th></tr><tr><td>-</td><td>${listaEnsaio[0]}</td></tr></table>`;

  // Tabela Culto Jovens
  html += `<div class="title-bar" style="background:var(--red)">CULTO JOVENS</div><table class="sheet"><tr><th>DATA</th><th>IRMÃO</th></tr><tr><td>-</td><td>${listaCultoJovem[0]}</td></tr></table>`;

  document.getElementById('resultArea').innerHTML = html;
}

document.getElementById('monthPick').value = new Date().toISOString().slice(0,7);
gerarTudo();
</script>
</body>
</html>
