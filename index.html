<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Rodízio de Cultos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .destaque { background-color: #ffeb3b; font-weight: bold; }
        .controls { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>RODÍZIO MÊS DE <span id="mesAtual"></span></h1>
    <div class="controls">
        <input type="month" id="selectMes">
        <button onclick="gerarRodizio()">Gerar</button>
        <button onclick="document.getElementById('painel').style.display='block'">Editar Nomes</button>
    </div>
    
    <div id="painel" style="display:none; background:#f0f0f0; padding:10px;">
        <h3>Definir Ordem dos Irmãos (um por linha):</h3>
        <textarea id="listaNomes" style="width:100%; height:100px;">ROMULO
DANIEL
FABIO
CESA</textarea>
        <button onclick="salvarConfig()">Salvar e Gerar</button>
    </div>

    <div id="tabelaRodizio"></div>

    <script>
        // Função para salvar a ordem definida pelo usuário
        function salvarConfig() {
            localStorage.setItem('nomesOrdem', document.getElementById('listaNomes').value);
            document.getElementById('painel').style.display = 'none';
            gerarRodizio();
        }

        function gerarRodizio() {
            const nomes = (localStorage.getItem('nomesOrdem') || document.getElementById('listaNomes').value).split('\n').filter(n => n.trim() !== "");
            const [ano, mes] = document.getElementById('selectMes').value.split('-').map(Number);
            
            // Define o índice inicial para o mês escolhido de forma simples: (ano*12 + mes) % quantidade_nomes
            // Isso garante que todo mês a sequência avance, mas seja previsível.
            let indice = ((ano * 12) + mes) % nomes.length;
            
            let html = `<table><tr><th>DATA</th><th>IRMÃO</th></tr>`;
            
            let data = new Date(ano, mes - 1, 1);
            while (data.getMonth() === mes - 1) {
                // Dias de culto: Domingo(0), Terça(2), Quinta(4)
                if ([0, 2, 4].includes(data.getDay())) {
                    let nome = nomes[indice % nomes.length];
                    let classe = "";
                    
                    // Lógica de Batismo: Domingo, segunda semana do mês, em meses ímpares
                    if (data.getDay() === 0 && data.getDate() > 7 && data.getDate() <= 14 && (mes % 2 !== 0)) {
                        nome += " — BATISMO";
                        classe = "class='destaque'";
                    }
                    
                    html += `<tr ${classe}><td>${data.getDate()}/${mes}</td><td>${nome}</td></tr>`;
                    indice++; // Avança para o próximo da lista
                }
                data.setDate(data.getDate() + 1);
            }
            html += `</table>`;
            
            document.getElementById('tabelaRodizio').innerHTML = html;
            document.getElementById('mesAtual').innerText = mes + '/' + ano;
        }

        // Inicialização
        document.getElementById('selectMes').value = new Date().toISOString().slice(0, 7);
        if(localStorage.getItem('nomesOrdem')) document.getElementById('listaNomes').value = localStorage.getItem('nomesOrdem');
        gerarRodizio();
    </script>
</body>
</html>
