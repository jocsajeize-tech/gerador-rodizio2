<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio CCB - Sequência Fixa</title>
<style>
  :root{ --border:#7a7a7a; --blue:#dbe7ff; --orange:#f4e0c8; --red:#f8d6d6; --titlebar:#cfcfcf; }
  body{ font-family: Arial, sans-serif; margin:0; background:#f7f7f7; }
  .wrap{max-width:1100px;margin:18px auto;padding:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  h1{font-size:28px;text-align:center}
  .controls{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
  #painelEditores {display:none; margin-bottom:12px; border:1px solid #ccc; padding:10px;}
  textarea.oper{width:100%; height:80px; margin-bottom:10px;}
  .title-bar{text-align:center;padding:8px;border:1px solid var(--border);background:var(--titlebar);font-weight:700;margin-top:15px}
  table.sheet{width:100%;border-collapse:collapse;font-size:14px}
  table.sheet th, table.sheet td{border:1px solid var(--border);padding:8px}
  .destaque{background-color:#ffeb3b; font-weight:bold;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="wrap">
  <h1>RODÍZIO MÊS DE <span id="previewMes">-</span></h1>
  <div class="controls">
    <input id="monthPick" type="month" />
    <button onclick="gerarRodizio()">Gerar Rodízio</button>
    <button onclick="document.getElementById('painelEditores').style.display='block'">⚙️ Editar Listas</button>
  </div>
  
  <div id="painelEditores">
    <label>Ordem da Lista de Cultos:</label>
    <textarea id="opsCulto" class="oper">CESA
ROMULO
DANIEL
FABIO</textarea>
    <button onclick="salvarTudo()">Salvar Ordem e Recalcular</button>
  </div>

  <div id="resultArea"></div>
</div>

<script>
// Carrega as listas salvas ou usa padrão
function carregar() {
    const saved = localStorage.getItem('minha_ordem');
    if(saved) document.getElementById('opsCulto').value = saved;
}

function salvarTudo() {
    localStorage.setItem('minha_ordem', document.getElementById('opsCulto').value);
    alert("Ordem salva com sucesso!");
    gerarRodizio();
}

function gerarRodizio() {
    const [y, m] = document.getElementById('monthPick').value.split('-').map(Number);
    const mi = m - 1;
    const lista = document.getElementById('opsCulto').value.split('\n').filter(s=>s.trim());
    
    // Calcula a sequência contínua baseada em dias de culto (0=Dom, 2=Ter, 4=Qui)
    let totalCultosPassados = 0;
    let dataReferencia = new Date(2026, 0, 1); // Data base: 01/01/2026
    let dataAtual = new Date(y, mi, 1);
    
    // Conta quantos dias de culto houve desde a referência até o dia 1 do mês escolhido
    for(let d = new Date(dataReferencia); d < dataAtual; d.setDate(d.getDate() + 1)) {
        if([0, 2, 4].includes(d.getDay())) totalCultosPassados++;
    }

    // Gerar tabela
    let html = `<div class="title-bar">CULTOS</div><table class="sheet"><tr><th>DATA</th><th>IRMÃO</th></tr>`;
    for(let i=1; i<=31; i++){
        let dt = new Date(y, mi, i);
        if(dt.getMonth() !== mi) break;
        if([0, 2, 4].includes(dt.getDay())){
            let nome = lista[totalCultosPassados % lista.length];
            html += `<tr><td>${dt.getDate()}/${m}</td><td>${nome}</td></tr>`;
            totalCultosPassados++;
        }
    }
    document.getElementById('resultArea').innerHTML = html + "</table>";
    document.getElementById('previewMes').textContent = m + "/" + y;
}

window.onload = () => { 
    carregar(); 
    document.getElementById('monthPick').value = new Date().toISOString().slice(0,7);
    gerarRodizio(); 
};
</script>
</body>
</html>
