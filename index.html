<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio Fixa</title>
<style>
  body{font-family: Arial, sans-serif; padding:20px; background:#f7f7f7;}
  .wrap{max-width:900px; margin:auto; background:#fff; padding:20px; box-shadow:0 0 10px rgba(0,0,0,0.1)}
  .panel{display:none; border:1px solid #ccc; padding:10px; margin-bottom:10px;}
  textarea{width:100%; height:80px; margin-bottom:5px;}
  table{width:100%; border-collapse:collapse; margin-top:10px;}
  th, td{border:1px solid #000; padding:8px;}
  .title{background:#ddd; font-weight:bold; text-align:center; padding:5px; margin-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <input type="month" id="monthPick">
  <button onclick="gerar()">Gerar</button>
  <button onclick="document.getElementById('painel').style.display='block'">Editar</button>

  <div id="painel" class="panel">
    <textarea id="opsCulto">CESA&#10;ROMULO&#10;DANIEL&#10;FABIO</textarea>
    <textarea id="opsReuniao">DANIEL F.N&#10;JONATAS</textarea>
    <textarea id="opsEnsaio">JONATAS</textarea>
    <textarea id="opsJovem">FABIO</textarea>
    <button onclick="salvar()">Salvar</button>
  </div>

  <div id="saida"></div>
</div>

<script>
function salvar(){
  localStorage.setItem('c', document.getElementById('opsCulto').value);
  localStorage.setItem('r', document.getElementById('opsReuniao').value);
  localStorage.setItem('e', document.getElementById('opsEnsaio').value);
  localStorage.setItem('j', document.getElementById('opsJovem').value);
  gerar();
}

function gerar(){
  const [y, m] = document.getElementById('monthPick').value.split('-').map(Number);
  const mi = m - 1;
  const c = (localStorage.getItem('c') || "CESA\nROMULO\nDANIEL\nFABIO").split('\n');
  const r = (localStorage.getItem('r') || "DANIEL F.N\nJONATAS").split('\n');
  const e = (localStorage.getItem('e') || "JONATAS").split('\n');
  const j = (localStorage.getItem('j') || "FABIO").split('\n');

  let html = `<div class="title">CULTOS</div><table>`;
  let pC = 0;
  for(let i=1; i<=31; i++){
    let d = new Date(y, mi, i);
    if(d.getMonth() !== mi) break;
    if([0,2,4].includes(d.getDay())){
       html += `<tr><td>${i}/${m}</td><td>${c[pC % c.length]}</td></tr>`;
       pC++;
    }
  }
  
  html += `</table><div class="title">REUNIÃO JOVENS</div><table>`;
  let pR = 0;
  for(let i=1; i<=31; i++){
    let d = new Date(y, mi, i);
    if(d.getMonth() !== mi) break;
    if(d.getDay() === 0){
       html += `<tr><td>${i}/${m}</td><td>${r[pR % r.length]}</td></tr>`;
       pR++;
    }
  }

  html += `</table><div class="title">ENSAIO</div><table><tr><td>${e[0]}</td></tr></table>`;
  html += `<div class="title">CULTO JOVEM</div><table><tr><td>${j[0]}</td></tr></table>`;
  
  document.getElementById('saida').innerHTML = html;
}

document.getElementById('monthPick').value = new Date().toISOString().slice(0,7);
document.getElementById('opsCulto').value = localStorage.getItem('c') || "CESA\nROMULO\nDANIEL\nFABIO";
document.getElementById('opsReuniao').value = localStorage.getItem('r') || "DANIEL F.N\nJONATAS";
document.getElementById('opsEnsaio').value = localStorage.getItem('e') || "JONATAS";
document.getElementById('opsJovem').value = localStorage.getItem('j') || "FABIO";
gerar();
</script>
</body>
</html>
