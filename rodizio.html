<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio de Cultos — Sequência Dinâmica</title>
<style>
  :root{ --border:#7a7a7a; --blue:#dbe7ff; --orange:#f4e0c8; --red:#f8d6d6; --titlebar:#cfcfcf; }
  body{ font-family: Arial, sans-serif; margin:0; background:#f7f7f7; color:#111; }
  .wrap{ max-width:1100px; margin:18px auto; padding:16px; background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.06) }
  h1{ font-size:28px; margin:0 0 6px; text-align:center }
  .controls{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:center; margin-bottom:12px }
  button{ cursor:pointer; padding:8px; border:1px solid #888; background:#eee }
  .btn-primary{ background:#2e6be6; color:#fff; border-color:#2e6be6 }
  .btn-pdf{ background:#c62828; color:#fff; border-color:#b71c1c }
  .btn-lock{ background:#f0a500; color:#fff; border-color:#d49200; font-weight:bold }
  #painelEditores { display: none; margin-bottom: 12px; }
  .card{ padding:12px; border:1px solid var(--border); background:#fff }
  textarea.oper{ width:100%; min-height:90px; padding:8px; box-sizing:border-box; }
  .title-bar{ text-align:center; padding:8px; border:1px solid var(--border); background:var(--titlebar); font-weight:700; margin-bottom:8px }
  table.sheet{ width:100%; border-collapse:collapse; margin:8px 0 18px; font-size:14px }
  table.sheet th, table.sheet td{ border:1px solid var(--border); padding:8px; vertical-align:middle }
  table.sheet th{ background:#e6e6e6; font-weight:700 }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="wrap">
  <h1>RODÍZIO MÊS DE <span id="previewMes">—</span></h1>
  <div class="controls">
    <input id="monthPick" type="month" />
    <button id="btnGenerate" class="btn-primary">Gerar Rodízio</button>
    <button id="btnPDF" class="btn-pdf">Exportar PDF</button>
    <button id="btnLock" class="btn-lock" onclick="verificarSenha()">🔓 Editar Operadores</button>
  </div>

  <div id="painelEditores" class="card">
    <h3>Operadores</h3>
    <label><strong>Culto (Dom/Ter/Qui)</strong></label><textarea id="opsCulto" class="oper">CESA&#10;ROMULO&#10;DANIEL&#10;FABIO</textarea>
    <label><strong>Reunião de Jovens</strong></label><textarea id="opsReuniao" class="oper">DANIEL F.N&#10;JONATAS</textarea>
    <label><strong>Ensaio</strong></label><textarea id="opsEnsaio" class="oper">JONATAS</textarea>
    <label><strong>Culto de Jovens</strong></label><textarea id="opsCultoJovem" class="oper">FABIO</textarea>
  </div>

  <div id="resultArea">
    <p style="text-align:center; color: #666; margin-top: 40px;">Selecione o mês e clique em "Gerar Rodízio".</p>
  </div>
</div>

<script>
const monthShort = ['JAN.','FEV.','MAR.','ABR.','MAI.','JUN.','JUL.','AGO.','SET.','OUT.','NOV.','DEZ.'];
const dayName = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
const SENHA_CORRETA = "1234";

function fmtShort(dt){ return dt.getDate() + '-' + monthShort[dt.getMonth()].toLowerCase(); }
function allWeekdays(y, m, wanted){ 
  const arr=[]; for(let d=1; d<=new Date(y, m+1, 0).getDate(); d++){ 
    const dt = new Date(y, m, d, 12, 0, 0); if(wanted.includes(dt.getDay())) arr.push(dt); 
  } return arr; 
}

function verificarSenha() {
  const p = document.getElementById('painelEditores');
  if (p.style.display === "block") { p.style.display = "none"; }
  else if (prompt("Senha:") === SENHA_CORRETA) { p.style.display = "block"; }
}

function gerarRodizio() {
  const [y, m] = document.getElementById('monthPick').value.split('-').map(Number);
  const mi = m - 1;
  document.getElementById('previewMes').textContent = monthShort[mi] + ' - ' + y;
  
  const opsC = document.getElementById('opsCulto').value.split('\n');
  const opsR = document.getElementById('opsReuniao').value.split('\n');
  const opsE = document.getElementById('opsEnsaio').value.split('\n');
  const opsJ = document.getElementById('opsCultoJovem').value.split('\n');

  let pC = 0, pR = 0, pE = 0, pJ = 0;

  // Cultos com regra de Batismo
  const cultoRows = allWeekdays(y, mi, [0,2,4]).map(dt => {
    let nome = opsC[pC++ % opsC.length];
    // Batismo: Meses ímpares (0, 2, 4...) e segundo domingo (índice 1 da lista de domingos)
    if (mi % 2 === 0 && dt.getDay() === 0) {
       const doms = allWeekdays(y, mi, [0]);
       if (doms.findIndex(d => d.getDate() === dt.getDate()) === 1) nome += " (BATISMO)";
    }
    return `<tr><td>${dayName[dt.getDay()]}</td><td>${fmtShort(dt)}</td><td>${nome}</td></tr>`;
  }).join('');

  const reuniaoRows = allWeekdays(y, mi, [0]).map(dt => `<tr><td>${dayName[dt.getDay()]}</td><td>${fmtShort(dt)}</td><td>${opsR[pR++ % opsR.length]}</td></tr>`).join('');
  
  document.getElementById('resultArea').innerHTML = 
    `<div class="title-bar">CULTOS</div><table class="sheet"><tr><th>DIA</th><th>DATA</th><th>IRMÃO</th></tr>${cultoRows}</table>` +
    `<div class="title-bar" style="background:var(--blue)">REUNIÃO JOVENS</div><table class="sheet"><tr><th>DIA</th><th>DATA</th><th>IRMÃO</th></tr>${reuniaoRows}</table>`;
}

document.getElementById('btnGenerate').addEventListener('click', gerarRodizio);
document.getElementById('btnPDF').addEventListener('click', () => html2pdf().from(document.getElementById("resultArea")).save());
document.getElementById('monthPick').value = new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2,'0');
</script>
</body>
</html>
